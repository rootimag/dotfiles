source = ~/.config/hypr/colors.conf

$font = JetBrainsMono Nerd Font
$font_clock = JetBrainsMono Nerd Font

general {
    hide_cursor = false
    ignore_empty_input = true
}

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 3, linear
    animation = fadeOut, 1, 5, linear
    animation = inputFieldDots, 1, 2, linear
}

background {
    monitor =
    path = screenshot
    color = $surface
    blur_size = 5
    blur_passes = 3
    noise = 0.01
    contrast = 1.3
    brightness = 0.8
    vibrancy = 0.21
    vibrancy_darkness = 0.0
}

label {
    monitor =
    text = cmd[update:1000] echo "<b><big> $(date +'%H') </big></b>"
    color = $primary
    font_size = 130
    font_family = $font_clock
    shadow_passes = 3
    shadow_size = 4
    position = 0, 29%
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "<b><big> $(date +'%M') </big></b>"
    color = $primary
    font_size = 130
    font_family = $font_clock
    shadow_passes = 3
    shadow_size = 4
    position = 0, 16%
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 250, 50
    outline_thickness = 4
    dots_size = 0.26
    dots_spacing = 0.64
    dots_center = true
    dots_rounding = -1
    rounding = 12
    outer_color = $primary $tertiary $primary
    inner_color = $surface_container
    font_color = $on_surface
    check_color = $secondary
    fail_color = $error
    fade_on_empty = false
    placeholder_text = <i>Password...</i>
    position = 0, 20%
    halign = center
    valign = bottom
}
